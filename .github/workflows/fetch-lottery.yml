name: Fetch Lottery Data

on:
  schedule:
    - cron: '0 2 * * *'   # 每天UTC 2:00（北京时间10:00）运行
  workflow_dispatch:

permissions:
  contents: write

env:
  TZ: Asia/Shanghai  # 设置时区为北京时间

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 升级到最新版本 actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      # 升级到最新版本 actions/setup-python@v5
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'  # 升级到 Python 3.11
      
      - name: Install dependencies
        run: |
          pip install requests
          pip install beautifulsoup4
      
      - name: Fetch latest 100 issues
        run: python fetch.py
      
      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data.json
          git diff --quiet && git diff --staged --quiet || git commit -m "更新双色球数据 $(date '+%Y-%m-%d %H:%M:%S')"
          git push
